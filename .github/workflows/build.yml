name: Build EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install opencv-python pillow pytesseract pyinstaller

      - name: Install Tesseract portable
        run: |
          choco install tesseract -y --no-progress 2>&1 | Out-Null
          New-Item -ItemType Directory -Path tesseract_portable -Force
          Copy-Item -Recurse -Path "$env:ProgramFiles\Tesseract-OCR\*" -Destination tesseract_portable\ -Force

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --windowed `
            --add-data "tesseract_portable;tesseract_portable" `
            --name "video-png" `
            video-png.py

      - uses: actions/upload-artifact@v4
        with:
          name: video-png-windows
          path: dist/video-png.exe
