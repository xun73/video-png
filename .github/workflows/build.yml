name: Build EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install opencv-python pillow pytesseract pyinstaller

      - name: Download and extract Tesseract portable
        run: |
          $url = "https://github.com/UB-Mannheim/tesseract/releases/download/v5.4.0.20240606/tesseract-ocr-w64-setup-5.4.0.20240606.exe"
          $out = "tesseract_setup.exe"
          curl.exe -sL -o $out $url
          & "C:\Program Files\7-Zip\7z.exe" x $out -otesseract_portable -y | Out-Null
          if (Test-Path "tesseract_portable/\$INSTDIR") {
            Move-Item -Path "tesseract_portable/\$INSTDIR\*" -Destination tesseract_portable\ -Force
            Remove-Item -Recurse -Force "tesseract_portable/\$INSTDIR"
          }
          Remove-Item $out

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --windowed `
            --add-data "tesseract_portable;tesseract_portable" `
            --name "video-png" `
            video-png.py

      - uses: actions/upload-artifact@v4
        with:
          name: video-png-windows
          path: dist/video-png.exe
